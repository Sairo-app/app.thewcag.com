# Local dev services for app.thewcag.com: Postgres + MinIO (R2 stand-in).
#   docker compose -f apps/web/docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: thewcag
    ports: ["5433:5432"]
    volumes: ["thewcag_pg:/var/lib/postgresql/data"]

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["thewcag_minio:/data"]

volumes:
  thewcag_pg:
  thewcag_minio:
