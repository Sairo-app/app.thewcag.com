appId: com.thewcag.app
productName: TheWCAG
copyright: Copyright © 2026 TheWCAG
artifactName: TheWCAG-${version}-${os}-${arch}.${ext}

directories:
  output: release
  buildResources: resources

files:
  - out/**/*
  - package.json
  # Workspace libraries are compiled into the Vite bundles. Do not ship their
  # raw TypeScript sources as runtime node_modules.
  - "!node_modules/@accessibility-build/**/*"

extraResources:
  - from: public/logo.png
    to: logo.png

asar: true
asarUnpack: []
npmRebuild: false
electronLanguages:
  # Electron does not ship a generic en.pak. Keeping the exact fallback locale
  # is required or packaged Windows renderers exit before loading the app.
  - en-US
generateUpdatesFilesForAllChannels: true
afterPack: resources/after-pack.mjs

protocols:
  - name: TheWCAG desktop authentication
    schemes:
      - thewcag

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: resources/icon.icns
  minimumSystemVersion: "12.0"
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSAppTransportSecurity:
      NSAllowsArbitraryLoads: false
      NSAllowsLocalNetworking: true
    NSScreenCaptureUsageDescription: TheWCAG captures the screen only when you start an inspection or evidence capture.
    NSCameraUsageDescription: TheWCAG does not access the camera.
    NSMicrophoneUsageDescription: TheWCAG does not access the microphone.
    NSBluetoothAlwaysUsageDescription: TheWCAG does not access Bluetooth.
    NSBluetoothPeripheralUsageDescription: TheWCAG does not access Bluetooth.

dmg:
  sign: false
  backgroundColor: "#F7F0DF"
  window:
    width: 600
    height: 420
  contents:
    - x: 160
      y: 210
    - x: 440
      y: 210
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  # Windows releases are intentionally unsigned until a CI-compatible signing
  # service is adopted. Update artifacts remain protected by the SHA-512 values
  # generated in latest.yml and are served from the canonical GitHub release.
  verifyUpdateCodeSignature: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TheWCAG
  deleteAppDataOnUninstall: false

publish:
  provider: github
  owner: Sairo-app
  repo: app.thewcag.com
  releaseType: release
