name: Release Electron desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-preflight:
    runs-on: ubuntu-latest
    env:
      MAC_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      MAC_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      THEWCAG_EXTENSION_ID: ${{ vars.THEWCAG_EXTENSION_ID }}
    steps:
      - uses: actions/checkout@v7
      - name: Require release tag to match desktop version
        run: node scripts/validate-release-version.mjs "${GITHUB_REF_NAME}"
      - name: Require macOS signing and notarization credentials
        shell: bash
        run: |
          missing=()
          for name in MAC_CERTIFICATE MAC_CERTIFICATE_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name}" ]; then missing+=("$name"); fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Production release blocked. Missing Apple signing secrets: ${missing[*]}"
            exit 1
          fi
      - name: Require the paired Chrome extension ID
        shell: bash
        run: |
          if [[ ! "$THEWCAG_EXTENSION_ID" =~ ^[a-p]{32}$ ]]; then
            echo "Production release blocked. Set the repository variable THEWCAG_EXTENSION_ID to the published 32-character Chrome extension ID."
            exit 1
          fi

  quality:
    needs: release-preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm verify

  build-mac:
    needs: quality
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build, sign, and notarize universal macOS app
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          THEWCAG_EXTENSION_ID: ${{ vars.THEWCAG_EXTENSION_ID }}
        run: pnpm build && pnpm exec electron-builder --mac --universal --publish never
      - name: Upload macOS installers and updater metadata
        uses: actions/upload-artifact@v7
        with:
          name: desktop-mac
          if-no-files-found: error
          path: |
            apps/desktop/release/*.dmg
            apps/desktop/release/*.zip
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest-mac.yml

  build-windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build unsigned Windows installer
        working-directory: apps/desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          THEWCAG_EXTENSION_ID: ${{ vars.THEWCAG_EXTENSION_ID }}
        run: pnpm build && pnpm exec electron-builder --win --x64 --publish never
      - name: Upload Windows installer and updater metadata
        uses: actions/upload-artifact@v7
        with:
          name: desktop-windows
          if-no-files-found: error
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.blockmap
            apps/desktop/release/latest.yml

  publish:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Collect release files
        shell: bash
        run: |
          mkdir release-files
          find artifacts -type f -exec cp {} release-files/ \;
      - name: Validate Electron-only release assets
        shell: bash
        run: node scripts/validate-electron-release.mjs release-files "${GITHUB_REF_NAME#v}"
      - name: Create SHA-256 checksums
        working-directory: release-files
        shell: bash
        run: shasum -a 256 * > SHA256SUMS.txt
      - name: Publish Electron release
        uses: softprops/action-gh-release@v3
        with:
          name: TheWCAG ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          body: |
            Electron release for macOS and Windows.

            macOS includes a signed and notarized universal DMG and ZIP. Windows includes an unsigned x64 installer and may show an Unknown Publisher or SmartScreen warning. Automatic-update metadata and SHA-256 checksums are attached to this release.
          fail_on_unmatched_files: true
          make_latest: true
          files: release-files/*
