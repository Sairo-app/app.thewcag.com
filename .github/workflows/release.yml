name: Release desktop

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: pnpm install --frozen-lockfile=false

      - name: Build signed app + updater artifacts (macOS)
        working-directory: apps/desktop
        env:
          # Updater signing (required for auto-updates)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple Developer ID signing + notarization (optional until provided;
          # without these the DMG is ad-hoc signed and shows a Gatekeeper prompt)
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm tauri build

      - name: Updater manifest partial (darwin-aarch64)
        run: node scripts/make-latest-json.mjs mac

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-mac
          path: |
            apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            apps/desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
            dist-updater/latest-mac.json

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: pnpm install --frozen-lockfile=false

      - name: Build signed app + updater artifacts (Windows)
        working-directory: apps/desktop
        env:
          # Same updater keypair signs both platforms. Authenticode code
          # signing of the .exe is optional (SmartScreen warns without it).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build

      - name: Updater manifest partial (windows-x86_64)
        run: node scripts/make-latest-json.mjs windows

      - name: Upload Windows bundle
        uses: actions/upload-artifact@v4
        with:
          name: bundle-windows
          path: |
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.nsis.zip
            apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.nsis.zip.sig
            dist-updater/latest-windows.json

  publish:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Merge updater manifests
        run: node scripts/merge-latest-json.mjs artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: TheWCAG ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/**/*.app.tar.gz.sig
            artifacts/**/*-setup.exe
            artifacts/**/*-setup.nsis.zip
            artifacts/**/*-setup.nsis.zip.sig
            dist-updater/latest.json
