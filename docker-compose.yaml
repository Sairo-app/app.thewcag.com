# Production stack for app.thewcag.com on Coolify (Docker Compose build pack).
# Postgres runs co-located in this stack - no third-party database. The web
# container derives DATABASE_URL from the postgres service and applies
# migrations on startup.
#
# Auto-set by Coolify (magic env vars - you never touch these):
#   SERVICE_PASSWORD_POSTGRES    -> generated Postgres password
#   SERVICE_BASE64_64_AUTHSECRET -> generated AUTH_SECRET
# Baked defaults (override only if you change providers/domain):
#   NEXT_PUBLIC_APP_URL, AUTH_EMAIL_FROM
# You MUST provide these in Coolify (external credentials - can't be generated):
#   AUTH_RESEND_KEY, R2_ENDPOINT, R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY,
#   R2_BUCKET, R2_PUBLIC_URL
#
# Coolify setup: Build Pack: Docker Compose; Compose file: this file;
# point app.thewcag.com at the `web` service, port 3100.
# (The :- fallbacks keep `docker compose up` working locally via the root .env.)
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thewcag
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES:-${POSTGRES_PASSWORD:-thewcag_dev}}
      POSTGRES_DB: thewcag
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thewcag -d thewcag"]
      interval: 5s
      timeout: 5s
      retries: 20

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Derived internally - Postgres lives in this stack, not a third party.
      DATABASE_URL: postgres://thewcag:${SERVICE_PASSWORD_POSTGRES:-${POSTGRES_PASSWORD:-thewcag_dev}}@postgres:5432/thewcag
      # Auto-generated by Coolify; baked default domain for prod.
      AUTH_SECRET: ${SERVICE_BASE64_64_AUTHSECRET:-${AUTH_SECRET:-dev_only_auth_secret_change_me}}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.thewcag.com}
      AUTH_TRUST_HOST: "true"
      AUTH_EMAIL_FROM: ${AUTH_EMAIL_FROM:-TheWCAG <noreply@updates.onchange.app>}
      # External credentials - set these in Coolify.
      AUTH_RESEND_KEY: ${AUTH_RESEND_KEY}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
    expose:
      - "3100"
    ports:
      - "3100:3100"
    # Lets Coolify/Traefik route only once the server is actually serving on
    # 3100 (migrations run on boot, so allow a generous start period).
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3100/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 45s

volumes:
  pgdata:
